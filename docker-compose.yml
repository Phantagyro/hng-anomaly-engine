networks:
  app-network:
    driver: bridge

volumes:
  HNG-nginx-logs:
    driver: local
  nextcloud-data:
    driver: local

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - nextcloud-data:/var/www/html
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud

  detector:
    build: ./detector
    container_name: detector
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    depends_on:
      - nginx
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
