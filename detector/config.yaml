# Sliding window settings
sliding_window_seconds: 60

# Baseline settings
baseline_window_minutes: 30
baseline_recalc_interval_seconds: 60
baseline_min_samples: 10
baseline_floor_mean: 0.1
baseline_floor_stddev: 0.1

# Anomaly detection thresholds
zscore_threshold: 3.0
rate_multiplier_threshold: 5.0

# Error surge settings
error_surge_multiplier: 3.0
error_tightened_zscore: 2.0
error_tightened_multiplier: 3.0

# Blocking settings
block_response_seconds: 10

# Auto-unban backoff schedule (seconds)
unban_schedule:
  - 600
  - 1800
  - 7200
  - -1

# Slack settings
slack_webhook_url: "${SLACK_WEBHOOK_URL}"

# Log settings
log_file: "/var/log/nginx/hng-access.log"
audit_log_file: "/var/log/detector/audit.log"

# Dashboard settings
dashboard_host: "0.0.0.0"
dashboard_port: 8080
dashboard_refresh_seconds: 3
